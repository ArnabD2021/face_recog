<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robot Brain — Control Interface</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #0c0900;
  --surface:    #151000;
  --surface2:   #1e1700;
  --border:     #2e2200;
  --border2:    #3d2e00;

  --amber:      #e8970a;
  --amber-dim:  rgba(232, 151, 10, 0.1);
  --amber-glow: rgba(232, 151, 10, 0.25);
  --orange:     #c94f0a;
  --orange-dim: rgba(201, 79, 10, 0.12);
  --sage:       #6b8f5e;
  --sage-dim:   rgba(107, 143, 94, 0.12);
  --red:        #b83030;

  --text:       #e8dcc0;
  --text-dim:   #8a7248;
  --text-faint: #4a3a18;

  --font-mono: 'Courier Prime', 'Courier New', monospace;
  --font-body: 'Lora', Georgia, serif;
}

html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-body); font-size: 14px; overflow: hidden; }

/* ── App shell ──────────────────────────────────────────────────── */

.app {
  display: grid;
  grid-template-rows: 50px 1fr;
  height: 100vh;
}

/* ── Header ─────────────────────────────────────────────────────── */

header {
  display: flex;
  align-items: center;
  gap: 20px;
  padding: 0 22px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: relative;
  z-index: 10;
  flex-shrink: 0;
}

.logo {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.12em;
  color: var(--text);
  white-space: nowrap;
}
.logo em { font-style: normal; color: var(--amber); }

.status-pill {
  display: flex;
  align-items: center;
  gap: 7px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 2px;
  padding: 4px 11px 4px 8px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 0.04em;
}
.s-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--text-faint);
  transition: background 0.3s, box-shadow 0.3s;
  flex-shrink: 0;
}
.s-dot.on  { background: var(--sage);  box-shadow: 0 0 6px var(--sage);  }
.s-dot.err { background: var(--red);   box-shadow: 0 0 5px var(--red);   }

.state-badge {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  padding: 2px 9px;
  border: 1px solid transparent;
  border-radius: 2px;
  color: var(--text-faint);
  transition: all 0.3s;
}
.state-badge.s-hearing  { color: var(--sage);   border-color: var(--sage);   background: var(--sage-dim);   }
.state-badge.s-thinking { color: var(--amber);  border-color: var(--amber);  background: var(--amber-dim);  }
.state-badge.s-doing    { color: var(--orange); border-color: var(--orange); background: var(--orange-dim); }
.state-badge.s-planning { color: var(--amber);  border-color: var(--border2); background: var(--surface2);  }

.header-right { margin-left: auto; }

.btn-ghost {
  background: none;
  border: 1px solid var(--border2);
  color: var(--text-dim);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.06em;
  padding: 4px 12px;
  border-radius: 2px;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-ghost:hover { color: var(--text); border-color: var(--text-dim); }

/* ── Main grid ──────────────────────────────────────────────────── */

.main {
  display: grid;
  grid-template-columns: 44% 1fr;
  overflow: hidden;
  min-height: 0;
}

/* ── Camera panel ────────────────────────────────────────────────── */

.camera-panel {
  background: #060400;
  position: relative;
  overflow: hidden;
  border-right: 1px solid var(--border);
}

.cam-label {
  position: absolute;
  top: 13px;
  left: 13px;
  z-index: 5;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  color: var(--amber);
  display: flex;
  align-items: center;
  gap: 7px;
}
.cam-label::before {
  content: '';
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--amber);
  box-shadow: 0 0 6px var(--amber);
  animation: blink-rec 2s ease-in-out infinite;
}
@keyframes blink-rec {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.15; }
}

.cam-corner {
  position: absolute;
  z-index: 5;
  width: 18px; height: 18px;
  border-color: rgba(232, 151, 10, 0.45);
  border-style: solid;
}
.cam-corner.tl { top: 9px;    left: 9px;   border-width: 2px 0 0 2px; }
.cam-corner.tr { top: 9px;    right: 9px;  border-width: 2px 2px 0 0; }
.cam-corner.bl { bottom: 9px; left: 9px;   border-width: 0 0 2px 2px; }
.cam-corner.br { bottom: 9px; right: 9px;  border-width: 0 2px 2px 0; }

.cam-scanlines {
  position: absolute;
  inset: 0;
  z-index: 4;
  pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 3px,
    rgba(0,0,0,0.13) 3px,
    rgba(0,0,0,0.13) 4px
  );
}

.cam-vignette {
  position: absolute;
  inset: 0;
  z-index: 3;
  pointer-events: none;
  background: radial-gradient(ellipse at center, transparent 40%, rgba(6,4,0,0.8) 100%);
}

.cam-img-wrap {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

#cam-img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: none;
  filter: sepia(0.15) brightness(0.95);
}

#cam-offline {
  position: absolute;
  inset: 0;
  z-index: 6;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 18px;
}

.offline-ring {
  width: 60px; height: 60px;
  border-radius: 50%;
  border: 1px solid var(--border2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  color: var(--text-faint);
  position: relative;
}
.offline-ring::after {
  content: '';
  position: absolute;
  inset: -8px;
  border-radius: 50%;
  border: 1px solid var(--border);
  opacity: 0.4;
}

#cam-offline p {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  color: var(--text-faint);
  text-align: center;
  line-height: 1.9;
}

#face-status {
  position: absolute;
  bottom: 13px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 6;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  padding: 4px 14px;
  border-radius: 2px;
  border: 1px solid transparent;
  display: none;
  white-space: nowrap;
  backdrop-filter: blur(8px);
  background: rgba(12,9,0,0.85);
}
#face-status.visible { display: block; border-color: var(--sage);  color: var(--sage);  }
#face-status.unknown { display: block; border-color: var(--red);   color: var(--red);   }

/* ── Right panel ─────────────────────────────────────────────────── */

.right-panel {
  display: grid;
  grid-template-rows: auto 1fr auto;
  overflow: hidden;
  background: var(--bg);
  min-height: 0;
}

/* ── State bar ──────────────────────────────────────────────────── */

.state-bar {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}

.state-card {
  padding: 8px 14px;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 3px;
  transition: background 0.3s;
  min-width: 0;
}
.state-card:last-child { border-right: none; }
.state-card.lit { background: var(--surface2); }

.sc-label {
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-faint);
  transition: color 0.3s;
}
.sc-value {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-dim);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.4;
  transition: color 0.3s;
}

.state-card[data-type="hearing"].lit  .sc-label,
.state-card[data-type="hearing"].lit  .sc-value  { color: var(--sage);   }
.state-card[data-type="thinking"].lit .sc-label,
.state-card[data-type="thinking"].lit .sc-value  { color: var(--amber);  }
.state-card[data-type="doing"].lit    .sc-label,
.state-card[data-type="doing"].lit    .sc-value  { color: var(--orange); }
.state-card[data-type="planning"].lit .sc-label,
.state-card[data-type="planning"].lit .sc-value  { color: var(--text-dim); }

/* ── Chat ────────────────────────────────────────────────────────── */

#chat {
  overflow-y: auto;
  padding: 20px 20px 12px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  min-height: 0;
}
#chat::-webkit-scrollbar { width: 3px; }
#chat::-webkit-scrollbar-track { background: transparent; }
#chat::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 1px; }

#chat-empty {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 18px;
  text-align: center;
  padding: 40px 24px;
  min-height: 180px;
}
.empty-icon {
  width: 52px; height: 52px;
  border-radius: 50%;
  border: 1px solid var(--border2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  color: var(--text-faint);
  position: relative;
}
.empty-icon::after {
  content: '';
  position: absolute;
  inset: -8px;
  border-radius: 50%;
  border: 1px solid var(--border);
  opacity: 0.4;
}
#chat-empty p {
  font-family: var(--font-mono);
  font-size: 12px;
  line-height: 2;
  color: var(--text-faint);
  letter-spacing: 0.04em;
}
#chat-empty kbd {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--amber);
  background: var(--amber-dim);
  border: 1px solid rgba(232,151,10,.2);
  border-radius: 2px;
  padding: 1px 7px;
}

/* Bubble rows */
.bubble-row {
  display: flex;
  gap: 10px;
  align-items: flex-end;
  animation: pop-in 0.2s ease-out;
  flex-shrink: 0;
}
@keyframes pop-in {
  from { opacity: 0; transform: translateY(5px); }
  to   { opacity: 1; transform: translateY(0);   }
}
.bubble-row.robot { align-self: flex-start; max-width: 88%; }
.bubble-row.user  { align-self: flex-end;   max-width: 88%; flex-direction: row-reverse; }

.b-avatar {
  width: 26px; height: 26px;
  border-radius: 2px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-mono);
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 0.04em;
}
.bubble-row.robot .b-avatar {
  background: var(--amber-dim);
  border: 1px solid rgba(232,151,10,.3);
  color: var(--amber);
}
.bubble-row.user .b-avatar {
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--text-dim);
}

.bubble {
  padding: 10px 14px;
  font-size: 14px;
  font-family: var(--font-body);
  line-height: 1.7;
  word-break: break-word;
  border-radius: 2px;
}
.bubble-row.robot .bubble {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-left: 2px solid var(--amber);
  color: var(--text);
}
.bubble-row.user .bubble {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-right: 2px solid var(--text-faint);
  color: var(--text-dim);
  font-style: italic;
}

/* Typing indicator */
#typing { display: none; flex-shrink: 0; }
#typing.vis { display: flex; }
#typing .bubble { padding: 13px 16px; }
.t-dots { display: flex; gap: 5px; align-items: center; }
.t-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--amber);
  animation: t-bounce 1.3s ease-in-out infinite;
}
.t-dot:nth-child(2) { animation-delay: 0.2s; }
.t-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes t-bounce {
  0%, 60%, 100% { opacity: 0.15; transform: translateY(0); }
  30%            { opacity: 1;    transform: translateY(-4px); }
}

/* ── Input area ──────────────────────────────────────────────────── */

.input-area {
  padding: 10px 16px 14px;
  border-top: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}

#listening-bar {
  display: none;
  align-items: center;
  gap: 10px;
  padding: 6px 12px;
  margin-bottom: 9px;
  border-radius: 2px;
  background: var(--sage-dim);
  border: 1px solid rgba(107,143,94,.25);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  color: var(--sage);
}
#listening-bar.vis { display: flex; }

.listen-rings {
  position: relative;
  width: 16px; height: 16px;
  flex-shrink: 0;
}
.l-ring {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  border: 1.5px solid var(--sage);
  animation: ring-out 1.7s ease-out infinite;
  opacity: 0;
}
.l-ring:nth-child(2) { animation-delay: 0.57s; }
.l-ring:nth-child(3) { animation-delay: 1.14s; }
.l-core { position: absolute; inset: 4px; border-radius: 50%; background: var(--sage); }
@keyframes ring-out {
  0%   { transform: scale(0.2); opacity: 0.7; }
  100% { transform: scale(2.1); opacity: 0;   }
}

.input-row { display: flex; gap: 8px; align-items: center; }

#cmd-input {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 2px;
  padding: 9px 14px;
  font-family: var(--font-body);
  font-size: 14px;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
#cmd-input::placeholder { color: var(--text-faint); font-style: italic; }
#cmd-input:focus {
  border-color: rgba(232,151,10,.5);
  box-shadow: 0 0 0 3px rgba(232,151,10,.06);
}
#cmd-input:disabled { opacity: 0.3; cursor: not-allowed; }

#send-btn {
  width: 38px; height: 38px;
  border-radius: 2px;
  border: none;
  background: var(--amber);
  color: #0c0900;
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
  flex-shrink: 0;
  line-height: 1;
}
#send-btn:hover { background: #f5aa1a; box-shadow: 0 0 10px var(--amber-glow); }
#send-btn:active { transform: scale(0.91); }
#send-btn:disabled { background: var(--border2); color: var(--text-faint); cursor: not-allowed; transform: none; box-shadow: none; }

/* ── Enrollment modal ────────────────────────────────────────────────── */

#enroll-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 100;
  background: rgba(6, 4, 0, 0.82);
  backdrop-filter: blur(4px);
  align-items: center;
  justify-content: center;
}
#enroll-overlay.vis { display: flex; }

#enroll-modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-top: 2px solid var(--amber);
  border-radius: 3px;
  padding: 28px 32px 24px;
  width: 340px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.6);
}
.em-title {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  color: var(--amber);
  text-transform: uppercase;
}
.em-body {
  font-family: var(--font-body);
  font-size: 14px;
  color: var(--text-dim);
  line-height: 1.6;
}
#enroll-phone {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 6px;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 14px;
  padding: 10px 12px;
  width: 100%;
  outline: none;
  transition: border-color 0.2s;
}
#enroll-phone:focus { border-color: rgba(232,151,10,.5); }
#enroll-phone::placeholder { color: var(--text-faint); font-style: italic; }
.em-actions { display: flex; gap: 8px; }
.btn-enroll-submit {
  flex: 1;
  background: var(--amber);
  border: none;
  border-radius: 2px;
  padding: 9px;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: #0c0900;
  cursor: pointer;
  transition: background 0.15s;
}
.btn-enroll-submit:hover { background: #f5aa1a; }
.btn-enroll-cancel {
  background: none;
  border: 1px solid var(--border2);
  border-radius: 2px;
  padding: 9px 14px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.06em;
  color: var(--text-faint);
  cursor: pointer;
  transition: color 0.15s;
}
.btn-enroll-cancel:hover { color: var(--text-dim); }

.profile-card {
  background: var(--surface2);
  border: 1px solid rgba(232,151,10,0.35);
  border-left: 3px solid var(--amber);
  border-radius: 6px;
  padding: 12px 14px;
  margin: 6px 0;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.pc-title {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.14em;
  color: var(--amber);
  text-transform: uppercase;
  margin-bottom: 4px;
}
.pc-row { display: flex; gap: 10px; align-items: baseline; }
.pc-label {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-faint);
  min-width: 48px;
  text-transform: uppercase;
}
.pc-value {
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--text);
}
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header>
    <div class="logo">ROBOT <em>BRAIN</em></div>

    <div class="status-pill">
      <div class="s-dot" id="ws-dot"></div>Brain
    </div>
    <div class="status-pill">
      <div class="s-dot" id="cam-dot"></div>Camera
    </div>

    <div class="state-badge" id="state-badge">Standby</div>

    <div class="header-right" style="display:flex;gap:8px;">
      <button class="btn-ghost" onclick="showEnrollModal()">+ Enroll</button>
      <button class="btn-ghost" onclick="clearChat()">Clear</button>
    </div>
  </header>

  <!-- Main -->
  <div class="main">

    <!-- Camera -->
    <div class="camera-panel">
      <div class="cam-label">Vision · Live</div>
      <div class="cam-corner tl"></div>
      <div class="cam-corner tr"></div>
      <div class="cam-corner bl"></div>
      <div class="cam-corner br"></div>
      <div class="cam-scanlines"></div>
      <div class="cam-vignette"></div>

      <div class="cam-img-wrap">
        <img id="cam-img" src="http://localhost:8766/video" alt="camera"
             onload="camOnline()" onerror="camOffline()">
      </div>

      <div id="cam-offline">
        <div class="offline-ring">◎</div>
        <p>Camera offline<br>Start brain.py to connect</p>
      </div>

      <div id="face-status"></div>
    </div>

    <!-- Right: chat + input -->
    <div class="right-panel">

      <!-- State bar -->
      <div class="state-bar">
        <div class="state-card" data-type="hearing">
          <div class="sc-label">Hearing</div>
          <div class="sc-value" id="val-hearing">—</div>
        </div>
        <div class="state-card" data-type="thinking">
          <div class="sc-label">Thinking</div>
          <div class="sc-value" id="val-thinking">—</div>
        </div>
        <div class="state-card" data-type="doing">
          <div class="sc-label">Speaking</div>
          <div class="sc-value" id="val-doing">—</div>
        </div>
        <div class="state-card" data-type="planning">
          <div class="sc-label">System</div>
          <div class="sc-value" id="val-planning">—</div>
        </div>
      </div>

      <!-- Chat -->
      <div id="chat">
        <div id="chat-empty">
          <div class="empty-icon">◎</div>
          <p>
            No conversation yet.<br>
            Say <kbd>robot</kbd> to wake up,<br>
            or type a command below.
          </p>
        </div>
        <div id="typing" class="bubble-row robot">
          <div class="b-avatar">AI</div>
          <div class="bubble">
            <div class="t-dots">
              <div class="t-dot"></div>
              <div class="t-dot"></div>
              <div class="t-dot"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Input -->
      <div class="input-area">
        <div id="listening-bar">
          <div class="listen-rings">
            <div class="l-ring"></div>
            <div class="l-ring"></div>
            <div class="l-core"></div>
          </div>
          Listening…
        </div>
        <div class="input-row">
          <input id="cmd-input" type="text" placeholder="Type a command…" autocomplete="off">
          <button id="send-btn" onclick="submitInput()" title="Send (Enter)">&#x2191;</button>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Enrollment modal -->
<div id="enroll-overlay">
  <div id="enroll-modal">
    <div class="em-title">◎ Unknown Face Detected</div>
    <div class="em-body">Enter your name and phone number to create your profile.</div>
    <input id="enroll-name" type="text" placeholder="Your name…" autocomplete="off">
    <input id="enroll-phone" type="tel" placeholder="Phone number…" autocomplete="off">
    <div class="em-actions">
      <button class="btn-enroll-submit" onclick="submitEnroll()">Enroll</button>
      <button class="btn-enroll-cancel" onclick="dismissEnroll()">Skip</button>
    </div>
  </div>
</div>

<script>
  const WS_URL  = 'ws://localhost:8765';
  const CAM_URL = 'http://localhost:8766/video';

  // ── Enrollment modal ────────────────────────────────────────────────
  const enrollOverlay = document.getElementById('enroll-overlay');
  const enrollName    = document.getElementById('enroll-name');
  const enrollPhone   = document.getElementById('enroll-phone');

  function showEnrollModal() {
    enrollName.value  = '';
    enrollPhone.value = '';
    enrollOverlay.classList.add('vis');
    setTimeout(() => enrollName.focus(), 50);
  }

  function dismissEnroll(notify = true) {
    enrollOverlay.classList.remove('vis');
    if (notify && ws?.readyState === WebSocket.OPEN)
      ws.send(JSON.stringify({ type: 'enroll_dismiss' }));
  }

  function submitEnroll() {
    const name  = enrollName.value.trim();
    const phone = enrollPhone.value.replace(/\D/g, '');
    if (!name)  { enrollName.focus();  return; }
    if (!phone) { enrollPhone.focus(); return; }
    if (ws?.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'enroll_response', name, phone }));
    }
    appendChatBubble('user', `Enrolling: ${name}`);
    dismissEnroll(false);
  }

  enrollName.addEventListener('keydown', e => {
    if (e.key === 'Enter')  enrollPhone.focus();
    if (e.key === 'Escape') dismissEnroll();
  });
  enrollPhone.addEventListener('keydown', e => {
    if (e.key === 'Enter') submitEnroll();
    if (e.key === 'Escape') dismissEnroll();
  });

  let ws       = null;
  let camAlive = false;
  const timers = {};

  const wsDot       = document.getElementById('ws-dot');
  const camDot      = document.getElementById('cam-dot');
  const camImg      = document.getElementById('cam-img');
  const camOffEl    = document.getElementById('cam-offline');
  const faceEl      = document.getElementById('face-status');
  const chatEl      = document.getElementById('chat');
  const chatEmpty   = document.getElementById('chat-empty');
  const typingEl    = document.getElementById('typing');
  const listenEl    = document.getElementById('listening-bar');
  const stateBadge  = document.getElementById('state-badge');
  const cmdInput    = document.getElementById('cmd-input');
  const sendBtn     = document.getElementById('send-btn');

  const valEls = {
    hearing:  document.getElementById('val-hearing'),
    thinking: document.getElementById('val-thinking'),
    doing:    document.getElementById('val-doing'),
    planning: document.getElementById('val-planning'),
  };
  const stateCards = {};
  document.querySelectorAll('.state-card').forEach(el => stateCards[el.dataset.type] = el);

  // ── Camera ─────────────────────────────────────────────────────────

  function camOnline() {
    if (camAlive) return;
    camAlive = true;
    camImg.style.display = 'block';
    camOffEl.style.display = 'none';
    camDot.className = 's-dot on';
  }

  function camOffline() {
    camAlive = false;
    camImg.style.display = 'none';
    camOffEl.style.display = 'flex';
    camDot.className = 's-dot err';
    setTimeout(() => { camImg.src = CAM_URL + '?' + Date.now(); }, 2000);
  }

  // ── WebSocket ───────────────────────────────────────────────────────

  function connect() {
    ws = new WebSocket(WS_URL);
    ws.onopen  = () => { wsDot.className = 's-dot on';  setInputEnabled(true); clearChat(); };
    ws.onclose = () => { wsDot.className = 's-dot err'; setInputEnabled(false); setTimeout(connect, 2000); };
    ws.onmessage = (e) => { try { handleEvent(JSON.parse(e.data)); } catch {} };
  }

  function handleEvent({ type, text }) {
    if (type === 'enrollment_ask') { showEnrollModal(); return; }
    if (type === 'profile')        { showProfileCard(text); return; }
    updateStateCard(type, text);
    updateStateBadge(type);
    updateFaceStatus(type, text);

    if (type === 'doing') {
      setThinking(false);
      appendChatBubble('robot', text);
    } else if (type === 'thinking') {
      setThinking(true);
    } else if (type === 'hearing') {
      const isFace = text.startsWith('Face') || text.startsWith('Unknown face');
      if (!isFace) {
        setListening(true);
        clearTimeout(timers.listen);
        timers.listen = setTimeout(() => setListening(false), 3000);
      }
    } else if (type === 'planning') {
      setThinking(false);
    }
  }

  function showProfileCard(text) {
    const fields = text.split(' | ');
    const html = fields.map(f => {
      const [label, ...rest] = f.split(': ');
      return `<div class="pc-row"><span class="pc-label">${label}</span><span class="pc-value">${rest.join(': ')}</span></div>`;
    }).join('');
    const card = document.createElement('div');
    card.className = 'profile-card';
    card.innerHTML = `<div class="pc-title">◎ Profile Found</div>${html}`;
    chatEl.appendChild(card);
    chatEl.scrollTop = chatEl.scrollHeight;
    if (chatEmpty) chatEmpty.style.display = 'none';
  }

  function updateStateCard(type, text) {
    if (!valEls[type]) return;
    valEls[type].textContent = text.length > 32 ? text.slice(0, 32) + '…' : text;
    stateCards[type]?.classList.add('lit');
    clearTimeout(timers[type]);
    timers[type] = setTimeout(() => stateCards[type]?.classList.remove('lit'), 3000);
  }

  function updateStateBadge(type) {
    const labels = { hearing: 'Hearing', thinking: 'Thinking', doing: 'Speaking', planning: 'System' };
    stateBadge.className = `state-badge s-${type}`;
    stateBadge.textContent = labels[type] || type;
    clearTimeout(timers.badge);
    timers.badge = setTimeout(() => {
      stateBadge.className = 'state-badge';
      stateBadge.textContent = 'Standby';
    }, 4000);
  }

  function updateFaceStatus(type, text) {
    if (type !== 'hearing') return;
    if (text.startsWith('Face detected:')) {
      faceEl.textContent = '● ' + text.replace('Face detected: ', '');
      faceEl.className = 'visible';
    } else if (text.startsWith('Unknown face')) {
      faceEl.textContent = '● Unknown face';
      faceEl.className = 'unknown';
    } else if (text === 'Face left camera view') {
      faceEl.className = '';
    }
  }

  // ── Chat ────────────────────────────────────────────────────────────

  function appendChatBubble(role, text) {
    if (chatEmpty.parentNode === chatEl) chatEl.removeChild(chatEmpty);
    if (typingEl.parentNode === chatEl)  chatEl.removeChild(typingEl);

    const row = document.createElement('div');
    row.className = `bubble-row ${role}`;
    row.innerHTML = `
      <div class="b-avatar">${role === 'robot' ? 'AI' : 'ME'}</div>
      <div class="bubble">${esc(text)}</div>
    `;
    chatEl.appendChild(row);
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function setThinking(on) {
    if (on) {
      if (chatEmpty.parentNode === chatEl) chatEl.removeChild(chatEmpty);
      if (typingEl.parentNode !== chatEl)  chatEl.appendChild(typingEl);
      typingEl.classList.add('vis');
      chatEl.scrollTop = chatEl.scrollHeight;
    } else {
      typingEl.classList.remove('vis');
      if (typingEl.parentNode === chatEl) chatEl.removeChild(typingEl);
    }
  }

  function setListening(on) {
    listenEl.classList.toggle('vis', on);
  }

  // ── Input ───────────────────────────────────────────────────────────

  function sendCommand(text) {
    if (ws?.readyState === WebSocket.OPEN)
      ws.send(JSON.stringify({ type: 'command', text }));
  }

  function submitInput() {
    const text = cmdInput.value.trim();
    if (!text) return;
    cmdInput.value = '';
    appendChatBubble('user', text);
    sendCommand(text);
    setThinking(true);
  }

  function setInputEnabled(on) {
    cmdInput.disabled = !on;
    sendBtn.disabled  = !on;
  }

  cmdInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitInput(); }
  });

  // ── Utilities ────────────────────────────────────────────────────────

  function clearChat() {
    chatEl.innerHTML = '';
    chatEl.appendChild(chatEmpty);
    Object.values(valEls).forEach(el => el.textContent = '—');
    Object.values(stateCards).forEach(el => el.classList.remove('lit'));
    stateBadge.className = 'state-badge';
    stateBadge.textContent = 'Standby';
    setThinking(false);
    setListening(false);
  }

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── Boot ─────────────────────────────────────────────────────────────

  setInputEnabled(false);
  connect();
</script>
</body>
</html>
